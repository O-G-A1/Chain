<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onchain Help Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .collection-card,
      .feature-card {
        transition: all 0.2s;
      }
      .collection-card:hover,
      .feature-card:hover {
        transform: translateY(-4px);
        border-color: #5e17eb;
      }
    </style>
  </head>
  <body class="bg-[#F8F9FC]">
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div
        class="max-w-7xl mx-auto px-4 md:px-8 py-4 md:py-5 flex items-center justify-between"
      >
        <div class="flex items-center gap-3 md:gap-10">
          <!-- Your Local Logo -->
          <div class="flex items-center gap-2">
            <img
              src="/Images/demoimage.png"
              alt="onchain"
              class="w-8 h-8 md:w-10 md:h-10 object-contain"
            />
            <span
              class="text-2xl md:text-3xl font-bold tracking-tighter text-[#0A2540]"
              >Onchain</span
            >
          </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-2xl mx-6 lg:mx-10">
          <div class="relative w-full">
            <input
              id="search-input"
              type="text"
              placeholder="What are you looking for?"
              class="w-full bg-white border border-gray-300 focus:border-[#5E17EB] focus:ring-1 focus:ring-[#5E17EB] rounded-3xl py-3.5 pl-14 text-base placeholder-gray-500"
            />
            <i
              class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl"
            ></i>
          </div>
        </div>

        <button
          onclick="openChat()"
          class="flex items-center gap-2 px-4 md:px-6 py-2.5 md:py-3 bg-[#5E17EB] hover:bg-[#4C0FCE] text-white rounded-3xl font-semibold text-sm md:text-base transition-all"
        >
          <i class="fas fa-headset"></i>
          <span class="hidden sm:inline">Contact Support</span>
        </button>
      </div>
    </nav>

    <!-- Hero -->
    <header
      class="bg-gradient-to-br from-[#0A2540] to-[#1E0A4D] text-white py-16"
    >
      <div class="max-w-4xl mx-auto text-center px-6">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">How can we help?</h1>
        <p class="text-xl text-gray-300 mb-8">
          Find answers fast or get direct support
        </p>

        <button
          onclick="openHelpModal()"
          class="px-8 py-3.5 bg-white text-[#0A2540] font-semibold rounded-3xl hover:bg-gray-100 transition flex items-center gap-3 text-lg mx-auto shadow-md"
        >
          <i class="fas fa-headset"></i>
          Get Instant Help
        </button>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
      <h2 class="text-2xl font-semibold mb-6">Most Read Articles</h2>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-16"
        id="most-read"
      ></div>

      <h2 class="text-2xl font-semibold mb-6">Browse Topics</h2>
      <div
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
        id="collections-grid"
      ></div>
    </div>

    <!-- Article Modal (Real Content) -->
    <div
      id="article-modal"
      class="hidden fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-3xl max-h-[90vh] overflow-hidden rounded-3xl shadow-2xl flex flex-col"
      >
        <div class="px-6 py-5 border-b flex justify-between items-center">
          <h2 id="modal-title" class="text-2xl font-bold text-[#0A2540]"></h2>
          <button
            onclick="closeModal()"
            class="text-4xl text-gray-400 hover:text-black"
          >
            ×
          </button>
        </div>
        <div
          id="modal-content"
          class="p-8 overflow-y-auto flex-1 text-gray-700 leading-relaxed"
        ></div>
      </div>
    </div>

    <!-- Instant Help Modal -->
    <div
      id="help-modal"
      class="hidden fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-4"
    >
      <div
        class="bg-white w-full max-w-5xl max-h-[90vh] overflow-hidden rounded-3xl shadow-2xl flex flex-col"
      >
        <div
          class="px-6 py-5 border-b flex justify-between items-center bg-gray-50"
        >
          <h2 class="text-2xl font-bold">Get Instant Help</h2>
          <button
            onclick="closeHelpModal()"
            class="text-4xl text-gray-400 hover:text-black"
          >
            ×
          </button>
        </div>
        <div id="help-body" class="p-6 overflow-y-auto flex-1">
          <h3 class="text-lg font-semibold mb-6 text-center">
            What issue are you facing?
          </h3>
          <div
            id="issue-grid"
            class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"
          >
            <div
              class="feature-card p-5 border rounded-2xl text-center cursor-pointer hover:shadow"
              onclick="selectIssue(this)"
            >
              <i class="fa-solid fa-shuffle text-3xl mb-3 text-purple-600"></i
              ><br />Migration Issues
            </div>
            <div
              class="feature-card p-5 border rounded-2xl text-center cursor-pointer hover:shadow"
              onclick="selectIssue(this)"
            >
              <i class="fa-solid fa-coins text-3xl mb-3 text-purple-600"></i
              ><br />Asset Recovery
            </div>
            <div
              class="feature-card p-5 border rounded-2xl text-center cursor-pointer hover:shadow"
              onclick="selectIssue(this)"
            >
              <i class="fa-solid fa-wrench text-3xl mb-3 text-purple-600"></i
              ><br />Rectification
            </div>
            <div
              class="feature-card p-5 border rounded-2xl text-center cursor-pointer hover:shadow"
              onclick="selectIssue(this)"
            >
              <i
                class="fa-solid fa-ellipsis-h text-3xl mb-3 text-purple-600"
              ></i
              ><br />Others
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Footer -->
    <footer
      class="bg-[#0A2540] text-gray-400 py-8 md:py-12 text-center text-sm"
    >
      <div class="max-w-7xl mx-auto px-4">© Onchain 2026 Help Center</div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
